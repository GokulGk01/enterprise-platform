# ============================================================
# destination-rules.yaml
# PURPOSE: Define traffic policies for each service
# ============================================================

apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: frontend
  namespace: enterprise-platform
spec:
  host: enterprise-platform-frontend
  # host → Kubernetes service name this rule applies to

  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        # maxConnections → max simultaneous TCP connections
        # prevents one service overwhelming another
      http:
        http1MaxPendingRequests: 50
        # pending requests before circuit breaker triggers
        http2MaxRequests: 100
        # max concurrent HTTP/2 requests

    outlierDetection:
      consecutiveGatewayErrors: 5
      # consecutiveGatewayErrors → eject pod after
      # 5 consecutive 502/503/504 errors
      interval: 30s
      # interval → check for errors every 30s
      baseEjectionTime: 30s
      # baseEjectionTime → eject for 30 seconds
      # This IS the circuit breaker:
      # bad pod removed from load balancer pool
      # traffic goes to healthy pods only
      maxEjectionPercent: 50
      # maxEjectionPercent → never eject more than 50%
      # always keep minimum healthy pods

  tls:
    mode: ISTIO_MUTUAL
    # ISTIO_MUTUAL → use Istio-managed mTLS certificates
    # automatically rotated by Istiod
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: backend
  namespace: enterprise-platform
spec:
  host: enterprise-platform-backend
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  tls:
    mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: api
  namespace: enterprise-platform
spec:
  host: enterprise-platform-api
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  tls:
    mode: ISTIO_MUTUAL
