# ============================================================
# peer-authentication.yaml
# PURPOSE: Enable STRICT mTLS for all services
# ============================================================

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: enterprise-platform
spec:
  mtls:
    mode: PERMISSIVE
    # STRICT → ALL traffic between services
    #          MUST use mTLS
    #          plain HTTP rejected
    #
    # PERMISSIVE → accepts both mTLS and plain HTTP
    #              use during migration
    #
    # STRICT is zero-trust:
    # → frontend can only talk to backend via mTLS
    # → no unauthorized service can connect
    # → all traffic encrypted in transit
