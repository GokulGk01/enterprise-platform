# ============================================================
# virtual-services.yaml
# PURPOSE: Traffic routing rules
# ============================================================

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: frontend
  namespace: enterprise-platform
spec:
  hosts:
    - enterprise-platform-frontend
    # hosts → which service this VS applies to
  http:
    - timeout: 10s
      # timeout → if no response in 10s → fail fast
      # prevents slow services from blocking callers
      retries:
        attempts: 3
        # attempts → retry failed requests 3 times
        perTryTimeout: 3s
        # perTryTimeout → each retry gets 3 seconds
        retryOn: gateway-error,connect-failure,retriable-4xx
        # retryOn → which errors trigger retry
        # gateway-error: 502, 503, 504
        # connect-failure: cannot connect to pod
        # retriable-4xx: 429 (rate limited)
      route:
        - destination:
            host: enterprise-platform-frontend
            port:
              number: 80
          weight: 100
          # weight: 100 → 100% traffic to this destination
          # Used for canary: weight: 90 + weight: 10
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: backend
  namespace: enterprise-platform
spec:
  hosts:
    - enterprise-platform-backend
  http:
    - timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure,retriable-4xx
      route:
        - destination:
            host: enterprise-platform-backend
            port:
              number: 8080
          weight: 100
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: api
  namespace: enterprise-platform
spec:
  hosts:
    - enterprise-platform-api
  http:
    - timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: gateway-error,connect-failure,retriable-4xx
      route:
        - destination:
            host: enterprise-platform-api
            port:
              number: 9090
          weight: 100
