# ============================================================
# templates/configmap.yaml
# PURPOSE: Application configuration
# Non-sensitive config only (sensitive = Vault, Module 12)
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "enterprise-platform.fullname" . }}-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "enterprise-platform.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.global.environment | quote }}
  # quote → wraps value in quotes
  # Required for strings that could be misread as numbers
  # e.g: "dev", "prod" (not dev, prod)

  LOG_LEVEL: {{ .Values.config.logLevel | quote }}

  FRONTEND_URL: {{ .Values.config.frontendUrl | quote }}

  BACKEND_URL: {{ .Values.config.backendUrl | quote }}

  API_URL: {{ .Values.config.apiUrl | quote }}

  {{- if .Values.config.extraConfig }}
  {{- toYaml .Values.config.extraConfig | nindent 2 }}
  {{- end }}
  {{/*
    extraConfig → allows adding arbitrary config
    without modifying the template
    Example in values.yaml:
    config:
      extraConfig:
        FEATURE_FLAG_X: "true"
        MAX_CONNECTIONS: "100"
  */}}