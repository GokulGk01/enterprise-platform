# ============================================================
# templates/service.yaml
# PURPOSE: Services for all 3 apps
# ============================================================

{{- range $name, $service := .Values.services }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-platform.fullname" $ }}-{{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    {{- include "enterprise-platform.labels" $ | nindent 4 }}
    app: {{ $name }}
spec:
  type: {{ $service.serviceType | default "ClusterIP" }}
  # ClusterIP → only accessible inside cluster
  # NodePort  → accessible on node IP + port
  # LoadBalancer → creates AWS NLB (expensive)
  # We use ClusterIP + Ingress (Module 7)
  ports:
    - port: {{ $service.port }}
      targetPort: http
      # targetPort: http → matches containerPort name
      # More readable than port number
      protocol: TCP
      name: http
  selector:
    {{- include "enterprise-platform.selectorLabels" $ | nindent 4 }}
    app: {{ $name }}
    # selector must match pod labels exactly
    # Service routes traffic to matching pods
{{- end }}