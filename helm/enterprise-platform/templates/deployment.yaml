{{- range $name, $service := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "enterprise-platform.fullname" $ }}-{{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    {{- include "enterprise-platform.labels" $ | nindent 4 }}
    app: {{ $name }}
spec:
  replicas: {{ $service.replicas }}
  selector:
    matchLabels:
      {{- include "enterprise-platform.selectorLabels" $ | nindent 6 }}
      app: {{ $name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "enterprise-platform.selectorLabels" $ | nindent 8 }}
        app: {{ $name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $ | sha256sum }}
    spec:
      serviceAccountName: {{ include "enterprise-platform.serviceAccountName" $ }}
      securityContext:
        runAsNonRoot: {{ $service.securityContext.runAsNonRoot }}
        {{- if $service.securityContext.runAsUser }}
        runAsUser: {{ $service.securityContext.runAsUser }}
        fsGroup: {{ $service.securityContext.fsGroup }}
        {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag }}"
          imagePullPolicy: {{ $service.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "enterprise-platform.fullname" $ }}-config
          env:
            - name: APP_VERSION
              value: {{ $service.image.tag | quote }}
            - name: SERVICE_NAME
              value: {{ $name | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ $service.resources.requests.cpu }}
              memory: {{ $service.resources.requests.memory }}
            limits:
              cpu: {{ $service.resources.limits.cpu }}
              memory: {{ $service.resources.limits.memory }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
{{- end }}