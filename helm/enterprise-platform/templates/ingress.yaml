{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "enterprise-platform.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "enterprise-platform.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: enterprise-platform
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/subnets: >-
      subnet-0e0637ddd4f74cca4,
      subnet-0fd21e2e1be7abb8b,
      subnet-0cbbc43c4a451e53e
    alb.ingress.kubernetes.io/tags: >-
      Environment={{ .Values.global.environment }},
      Project={{ .Values.global.project }},
      ManagedBy=Helm
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "enterprise-platform.fullname" . }}-backend
                port:
                  number: {{ .Values.services.backend.port }}
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "enterprise-platform.fullname" . }}-api
                port:
                  number: {{ .Values.services.api.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "enterprise-platform.fullname" . }}-frontend
                port:
                  number: {{ .Values.services.frontend.port }}
{{- end }}
