# ── Namespace ──────────────────────────────────────────────
namespace:
  create: true
  name: enterprise-platform

# ── Service Account ────────────────────────────────────────
serviceAccount:
  create: true
  name: enterprise-platform
  annotations: {}
  # Vault IRSA annotation added in Module 12:
  # eks.amazonaws.com/role-arn: arn:aws:iam::884390772196:role/...

# ── Image Pull Secrets ─────────────────────────────────────
imagePullSecrets: []
# ECR uses IAM auth so no pull secrets needed
# Node role has ECR read permission (Module 3)

# ── Application Config ─────────────────────────────────────
config:
  logLevel: info
  frontendUrl: "http://localhost:80"
  backendUrl: "http://localhost:8080"
  apiUrl: "http://localhost:9090"
  extraConfig: {}

# ── Services ───────────────────────────────────────────────
# Each service has identical structure
# range loop in templates iterates over this map
services:
  frontend:
    image:
      repository: 884390772196.dkr.ecr.us-east-1.amazonaws.com/enterprise-platform/frontend
      tag: latest
      pullPolicy: Always
    replicas: 2
    port: 80
    serviceType: ClusterIP
    securityContext:
      runAsUser: 101
      # 101 → nginx user UID in nginx:alpine
      fsGroup: 101
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

  backend:
    image:
      repository: 884390772196.dkr.ecr.us-east-1.amazonaws.com/enterprise-platform/backend
