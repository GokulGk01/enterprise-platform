# ============================================================
# helm/enterprise-platform/values.yaml
# CI/CD pipeline updates image tags in this file
# ArgoCD detects changes and syncs to cluster
# ============================================================

# Global settings
global:
  environment: dev
  project: enterprise-platform
  registry: 884390772196.dkr.ecr.us-east-1.amazonaws.com
# Frontend service
frontend:
  image:
    repository: 884390772196.dkr.ecr.us-east-1.amazonaws.com/enterprise-platform/frontend
    tag: dd281f28
    # ↑ CI/CD pipeline updates this tag on every merge to main
    pullPolicy: Always
  replicas: 2
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
# Backend service
backend:
  image:
    repository: 884390772196.dkr.ecr.us-east-1.amazonaws.com/enterprise-platform/backend
    tag: dd281f28
    pullPolicy: Always
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
# API service
api:
  image:
    repository: 884390772196.dkr.ecr.us-east-1.amazonaws.com/enterprise-platform/api
    tag: dd281f28
    pullPolicy: Always
  replicas: 2
  port: 9090
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
