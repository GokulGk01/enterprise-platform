      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

  api:
    image:
      repository: 884390772196.dkr.ecr.us-east-1.amazonaws.com/enterprise-platform/api
      tag: latest
      pullPolicy: Always
    replicas: 2
    port: 9090
    serviceType: ClusterIP
    securityContext:
      runAsUser: 1001
      # 1001 → appuser UID from api Dockerfile
      fsGroup: 1001
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
