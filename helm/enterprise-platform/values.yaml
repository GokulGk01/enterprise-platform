# ============================================================
# values.yaml
# ============================================================

global:
  environment: dev
  project: enterprise-platform
  registry: 884390772196.dkr.ecr.us-east-1.amazonaws.com
namespace:
  create: true
  name: enterprise-platform
serviceAccount:
  create: true
  name: enterprise-platform
  annotations: {}
imagePullSecrets: []
config:
  logLevel: info
  frontendUrl: "http://localhost:80"
  backendUrl: "http://localhost:8080"
  apiUrl: "http://localhost:9090"
  extraConfig: {}
services:
  frontend:
    image:
      repository: 884390772196.dkr.ecr.us-east-1.amazonaws.com/enterprise-platform/frontend
      tag: latest
      pullPolicy: Always
    replicas: 2
    port: 80
    serviceType: ClusterIP
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      fsGroup: 0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  backend:
    image:
      repository: 884390772196.dkr.ecr.us-east-1.amazonaws.com/enterprise-platform/backend
      tag: latest
      pullPolicy: Always
    replicas: 2
    port: 8080
    serviceType: ClusterIP
    securityContext:
      runAsUser: 1001
      fsGroup: 1001
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  api:
    image:
      repository: 884390772196.dkr.ecr.us-east-1.amazonaws.com/enterprise-platform/api
      tag: latest
      pullPolicy: Always
    replicas: 2
    port: 9090
    serviceType: ClusterIP
    securityContext:
      runAsUser: 1001
      fsGroup: 1001
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
ingress:
  enabled: false
  host: enterprise-platform.example.com
  annotations: {}
  tls:
    enabled: false
    certificateArn: ""
    secretName: enterprise-platform-tls
nameOverride: ""
fullnameOverride: ""
frontend:
  image:
    tag: 68a8e4c5
backend:
  image:
    tag: 68a8e4c5
api:
  image:
    tag: 68a8e4c5
