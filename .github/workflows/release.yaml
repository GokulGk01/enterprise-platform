# ============================================================
# .github/workflows/release.yaml
# PURPOSE: Production release on git tag push
# TRIGGERS: Push of version tags (v1.0.0, v2.1.3)
# ============================================================

name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'
      # v*.*.* → matches semantic version tags
      # e.g: v1.0.0, v2.1.3, v10.0.0
      # Release pipeline ONLY runs on tagged releases
      # Not on every commit

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  PROJECT_NAME: enterprise-platform

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [frontend, backend, api]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # GITHUB_REF_NAME → the tag name (v1.0.0)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building release: ${VERSION}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build release image
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}"
          VERSION="${{ steps.version.outputs.version }}"

          docker build \
            --tag ${IMAGE}:${VERSION} \
            --tag ${IMAGE}:stable \
            --label "version=${VERSION}" \
            --label "release=true" \
            --file apps/${{ matrix.app }}/Dockerfile \
            apps/${{ matrix.app }}/

      - name: Security scan release image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}:${{ steps.version.outputs.version }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          # exit-code: 1 → BLOCK release on vulnerabilities
          # Production releases MUST be clean

      - name: Push release image
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}"
          VERSION="${{ steps.version.outputs.version }}"
          docker push ${IMAGE}:${VERSION}
          docker push ${IMAGE}:stable

      - name: Sign release image
        uses: sigstore/cosign-installer@v3
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}:${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes in ${{ steps.version.outputs.version }}

            ### Images Published
            - `enterprise-platform/frontend:${{ steps.version.outputs.version }}`
            - `enterprise-platform/backend:${{ steps.version.outputs.version }}`
            - `enterprise-platform/api:${{ steps.version.outputs.version }}`

            ### Security
            - All images scanned with Trivy
            - No CRITICAL/HIGH vulnerabilities
            - Images signed with Cosign
            - SBOMs attached to images
          generate_release_notes: true
          # Automatically generates changelog from commits