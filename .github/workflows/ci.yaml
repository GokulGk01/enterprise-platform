name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main

# ── ADD THIS PERMISSIONS BLOCK ─────────────────────────────
permissions:
  contents: write
  # contents: write → allows pushing commits back to repo
  # (needed for update-gitops job)

  security-events: write
  # security-events: write → allows uploading SARIF results
  # to GitHub Security tab (needed for Trivy/CodeQL)

  actions: read
  # actions: read → allows reading workflow runs

  id-token: write
  # id-token: write → allows OIDC token generation
  # needed for Cosign keyless signing
# ───────────────────────────────────────────────────────────

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  PROJECT_NAME: enterprise-platform

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/frontend/Dockerfile
          failure-threshold: warning

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/backend/Dockerfile
          failure-threshold: warning

      - name: Lint api Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/api/Dockerfile
          failure-threshold: warning

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Lint Helm chart
        run: helm lint helm/enterprise-platform/

  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: lint

    # ── Job-level permissions ───────────────────────────────
    permissions:
      contents: write
      security-events: write
      id-token: write
      actions: read
    # ───────────────────────────────────────────────────────

    strategy:
      matrix:
        app: [frontend, backend, api]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE_TAG="${SHORT_SHA}"
          if [ "$GITHUB_REF_NAME" == "main" ]; then
            EXTRA_TAG="latest"
          else
            EXTRA_TAG="${GITHUB_REF_NAME//\//-}"
          fi
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "extra_tag=${EXTRA_TAG}" >> $GITHUB_OUTPUT
          echo "image_name=${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.app }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }} \
            --tag ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.extra_tag }} \
            --label "git.commit=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.number=${{ github.run_number }}" \
            --file apps/${{ matrix.app }}/Dockerfile \
            apps/${{ matrix.app }}/

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
          format: sarif
          output: trivy-results-${{ matrix.app }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        # ↑ Updated from v3 → v4 (v3 deprecated Dec 2026)
        if: always()
        with:
          sarif_file: trivy-results-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
          format: spdx-json
          output-file: sbom-${{ matrix.app }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: sbom-${{ matrix.app }}
          path: sbom-${{ matrix.app }}.spdx.json
          retention-days: 90

      - name: Push image to ECR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          docker push ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
          docker push ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.extra_tag }}

      - name: Install Cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}

      - name: Attach SBOM to image
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attach sbom \
            --sbom sbom-${{ matrix.app }}.spdx.json \
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}

  update-gitops:
    name: Update GitOps Values
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'

    # ── Job-level permissions ───────────────────────────────
    permissions:
      contents: write
    # ───────────────────────────────────────────────────────

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          # Install yq on GitHub runner
          # Not available by default on ubuntu-latest

      - name: Update Helm values with new image tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          yq -i ".frontend.image.tag = \"${SHORT_SHA}\"" \
            helm/enterprise-platform/values.yaml
          yq -i ".backend.image.tag = \"${SHORT_SHA}\"" \
            helm/enterprise-platform/values.yaml
          yq -i ".api.image.tag = \"${SHORT_SHA}\"" \
            helm/enterprise-platform/values.yaml

      - name: Commit and push GitOps changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add helm/enterprise-platform/values.yaml
          git diff --staged --quiet || \
            git commit -m "chore: update image tags to ${GITHUB_SHA::8}

            Updated by CI pipeline run #${{ github.run_number }}
            Triggered by: ${{ github.actor }}"
          git push origin main