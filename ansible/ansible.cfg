[defaults]
inventory = /Users/gokul/Intellect_prep/enterprise-platform/ansible/inventory/local.ini
remote_user = ec2-user
private_key_file = ~/.ssh/id_ed25519
host_key_checking = False
forks = 10
stdout_callback = yaml
retry_files_enabled = False
roles_path = /Users/gokul/Intellect_prep/enterprise-platform/ansible/roles

[privilege_escalation]
become = false
become_method = sudo
become_user = root

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
